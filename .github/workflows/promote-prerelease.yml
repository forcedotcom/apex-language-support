name: Promote Nightly to Pre-release

on:
  schedule:
    # Wednesdays at 7 AM UTC
    - cron: '0 7 * * 3'
  workflow_dispatch:
    inputs:
      min-tag-age-days:
        description: 'Minimum nightly age in days before eligible for promotion (default: 7)'
        required: false
        default: '7'
        type: string
      dry-run:
        description: 'Run in dry-run mode (no actual publishing or tagging)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: promote-prerelease
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  promote:
    # TODO: Change to @main once feat/add-vscode-extension-ci is merged
    uses: salesforcecli/github-workflows/.github/workflows/vscode-promote-prerelease.yml@feat/add-vscode-extension-ci
    with:
      min-tag-age-days: ${{ inputs.min-tag-age-days || '7' }}
      vsix-name-pattern: 'apex-language-server-extension-*.vsix'
      exclude-web-vsix: 'true'
      extension-name: 'apex-lsp-vscode-extension'
      dry-run: ${{ inputs.dry-run || 'false' }}
    secrets: inherit
