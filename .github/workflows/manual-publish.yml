name: Manual Publish

# Publish a VS Code extension to the marketplace from either:
#   - A nightly GitHub Release (version-tag path — normal workflow)
#   - A branch CI build artifact (source-run-id path — out-of-band, bypass mandatory)
#
# Exactly one of version-tag or source-run-id must be provided.

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension to publish'
        required: true
        default: 'apex-lsp-vscode-extension'
        type: choice
        options:
          - apex-lsp-vscode-extension
      version-tag:
        description: >
          [Tag path] Nightly git tag to publish from
          (e.g. apex-language-server-extension-v0.5.3-nightly.20260301).
          Mutually exclusive with source-run-id.
        required: false
        default: ''
        type: string
      source-run-id:
        description: >
          [Run path] GitHub Actions run ID whose VSIX artifact to publish
          (e.g. 12345678). Use for branch builds that don't produce a GH release.
          Mutually exclusive with version-tag.
          IMPORTANT: skip-quality-checks must be true and confirm-bypass must be BYPASS.
        required: false
        default: ''
        type: string
      slot:
        description: 'Marketplace slot to publish to (pre-release or stable)'
        required: true
        default: 'pre-release'
        type: choice
        options:
          - pre-release
          - stable
      registries:
        description: 'Registries to publish to'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - vsce
          - ovsx
      target-stable-version:
        description: >
          Optional stable version override (e.g. 0.6.1 for a stable patch).
          Must be valid semver with an EVEN minor. If omitted, auto-computed via
          semver minor bump (e.g. 0.5.3 → 0.6.0). Only applies when slot is stable.
          Required when using source-run-id with slot stable.
        required: false
        default: ''
        type: string
      skip-quality-checks:
        description: 'Skip CI quality gate. REQUIRED when using source-run-id.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      confirm-bypass:
        description: 'Type BYPASS to confirm skipping CI quality gate (required when skip-quality-checks is true)'
        required: false
        default: ''
        type: string
      dry-run:
        description: 'Run in dry-run mode (no actual publishing or tagging)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: manual-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  manual-publish:
    # TODO: Change to @main once feat/add-vscode-extension-ci is merged
    uses: salesforcecli/github-workflows/.github/workflows/vscode-manual-publish.yml@feat/add-vscode-extension-ci
    with:
      extension-name: ${{ inputs.extension }}
      vsix-name-pattern: 'apex-language-server-extension-*.vsix'
      version-tag: ${{ inputs.version-tag }}
      source-run-id: ${{ inputs.source-run-id }}
      slot: ${{ inputs.slot }}
      registries: ${{ inputs.registries }}
      target-stable-version: ${{ inputs.target-stable-version }}
      skip-quality-checks: ${{ inputs.skip-quality-checks }}
      confirm-bypass: ${{ inputs.confirm-bypass }}
      exclude-web-vsix: 'true'
      extensions-root: 'packages'
      vsix-artifact-name: 'vsix-packages'
      required-ci-checks: 'CI Complete, Package / Package, Test Quality (ubuntu-latest, lts/*)'
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
