name: Promote Pre-release to Stable

on:
  # Cron schedule intentionally disabled — promotion to stable is manual only.
  # To re-enable scheduled promotion, restore the schedule trigger below:
  #   schedule:
  #     # Wednesdays at 6 AM UTC (1 hour before pre-release promotion)
  #     - cron: '0 6 * * 3'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no actual publishing or tagging)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: promote-stable
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  promote:
    # TODO: Change to @main once feat/add-vscode-extension-ci is merged
    uses: salesforcecli/github-workflows/.github/workflows/vscode-promote-stable.yml@feat/add-vscode-extension-ci
    with:
      extension-name: 'apex-lsp-vscode-extension'
      vsix-name-pattern: 'apex-language-server-extension-*.vsix'
      exclude-web-vsix: 'true'
      extensions-root: 'packages'
      dry-run: ${{ inputs.dry-run || 'false' }}
    secrets: inherit
