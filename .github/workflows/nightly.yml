name: Nightly Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
        type: string
      dry-run:
        description: 'Run in dry-run mode (no actual publishing)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.event.inputs.branch || 'main' }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  nightly-release:
    # TODO: Change to @main once feat/add-vscode-extension-ci is merged
    uses: salesforcecli/github-workflows/.github/workflows/vscode-publish-extensions.yml@feat/add-vscode-extension-ci
    with:
      branch: ${{ github.event.inputs.branch || 'main' }}
      # Always publish the apex-lsp-vscode-extension (only extension in this repo)
      extensions: 'apex-lsp-vscode-extension'
      registries: 'all'
      pre-release: 'true'
      version-bump: 'auto'
      exclude-web-vsix: 'true'
      dry-run: ${{ github.event.inputs.dry-run == true || github.event.inputs.dry-run == 'true' }}
    secrets: inherit
